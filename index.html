<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แชร์โปรโมชั่นพิเศษ</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
    margin:0;
    padding:0;
    font-family: 'Prompt', sans-serif;
    background:#0f172a;
    color:#fff;
    text-align:center;
}

.container{
    max-width:420px;
    margin:auto;
    padding:20px;
}

img{
    width:100%;
    border-radius:16px;
    box-shadow:0 0 20px rgba(255,215,0,0.4);
}

.caption{
    margin-top:12px;
    font-size:16px;
    color:#e2e8f0;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#FFD700,#ffb700);
    color:#000;
    cursor:pointer;
}

button:active{
    transform:scale(0.97);
}

#success{
    margin-top:15px;
    display:none;
    color:#FFD700;
}
</style>
</head>

<body>

<div class="container">

    <img src="https://img2.pic.in.th/b74667a3-0ac6-4fe3-ac82-f05703ca1bb2.jpg">

    <div class="caption">
        แชร์ให้เพื่อนหรือกลุ่ม เพื่อรับสิทธิ์พิเศษทันที 🎁
    </div>

    <button onclick="shareFlex()">📤 กดแชร์เลย</button>

    <div id="success">แชร์สำเร็จแล้ว 🎉</div>

</div>

<script>

async function initLIFF(){
    await liff.init({ liffId: "2009033240-CysxfEv8" });
}
initLIFF();

async function shareFlex(){

    if(!liff.isLoggedIn()){
        liff.login();
        return;
    }

    const flexMessage = {
        type: "flex",
        altText: "เครดิตฟรี 24 ชั่วโมง",
        contents: {
            type: "bubble",
            size: "giga",

            hero: {
                type: "image",
                url: "https://img2.pic.in.th/b74667a3-0ac6-4fe3-ac82-f05703ca1bb2.jpg",
                size: "full",
                aspectMode: "cover",
                aspectRatio: "1:1"
            },

            body: {
                type: "box",
                layout: "vertical",
                spacing: "md",
                paddingAll: "20px",
                backgroundColor: "#111111",
                alignItems: "center",
                contents: [
                    {
                        type: "text",
                        text: "เครดิตฟรี 24 ชั่วโมง",
                        weight: "bold",
                        size: "xl",
                        align: "center",
                        wrap: true,
                        color: "#FFD700"
                    },
                    {
                        type: "text",
                        text: "สิทธิ์พิเศษสำหรับสมาชิกวันนี้เท่านั้น รีบกดรับก่อนหมดเวลา",
                        size: "sm",
                        align: "center",
                        wrap: true,
                        color: "#f5f5f5"
                    }
                ]
            },

            footer: {
                type: "box",
                layout: "vertical",
                paddingAll: "18px",
                backgroundColor: "#1a1a1a",
                alignItems: "center",
                contents: [
                    {
                        type: "button",
                        style: "primary",
                        height: "sm",
                        color: "#FFD700",
                        action: {
                            type: "uri",
                            label: "กดรับสิทธิ์ทันที",
                            uri: "https://24hrpung.carrd.co"
                        }
                    }
                ]
            }
        }
    };

    try{
        await liff.shareTargetPicker([flexMessage]);
        document.getElementById("success").style.display = "block";
    }catch(err){
        console.error(err);
    }
}

</script>

</body>
</html>
